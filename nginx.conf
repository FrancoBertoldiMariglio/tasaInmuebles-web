# nginx.conf — reverse-proxy delante del server Next.js (standalone) de
# tasainmuebles-web.
#
# Topología K8s: nginx como SIDECAR en el mismo pod que la app → proxy a
# 127.0.0.1:3000. El TLS se termina en el ALB/Ingress de AWS, así que acá se
# sirve HTTP plano en :8080. Montar este archivo en la imagen oficial
# nginx:alpine vía ConfigMap (en /etc/nginx/nginx.conf).
#
# Si en vez de sidecar se usa un Deployment de nginx separado, cambiar el
# upstream `server 127.0.0.1:3000` por el DNS del Service (ej:
# `server tasainmuebles-web.default.svc.cluster.local:3000`).

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logs a stdout/stderr — K8s recoge los logs del contenedor
  access_log /dev/stdout;
  error_log  /dev/stderr warn;

  server_tokens off;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;

  # Uploads (ej. fotos de tasación) si pasan por la web; ajustar según necesidad
  client_max_body_size 25m;

  # --- Compresión ---
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css application/javascript application/json
    application/x-javascript text/xml application/xml application/xml+rss
    text/javascript image/svg+xml application/wasm;

  upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 32;
  }

  server {
    listen 8080;
    server_name _;

    # Probe de liveness/readiness de K8s (no toca al server de Next)
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Assets versionados de Next: cache agresivo e inmutable.
    location /_next/static/ {
      proxy_pass http://nextjs;
      proxy_set_header Host $host;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Resto: SSR + middleware de auth + API routes → server de Next.
    location / {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      # El ALB de AWS setea X-Forwarded-Proto; Supabase SSR lo usa para cookies
      # `Secure`. Si llegara vacío, caemos al scheme de la conexión a nginx.
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_set_header Connection        "";

      # Headers de seguridad mínimos (HSTS/TLS los maneja el ALB)
      add_header X-Frame-Options        "SAMEORIGIN"                       always;
      add_header X-Content-Type-Options "nosniff"                          always;
      add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;

      proxy_connect_timeout 5s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }
}
